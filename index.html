<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>روابط فطائر الخالدية للمعجنات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary-orange: #C84C21; --primary-green: #144A42; --bg-color: #F7F7F7; --white: #FFFFFF; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); margin: 0; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
        .profile-container { text-align: center; margin-bottom: 30px; }
        .profile-logo { width: 100px; height: 100px; background-image: url('logo.png'); background-size: cover; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { font-size: 22px; color: var(--primary-green); margin: 0; }
        .description { font-size: 14px; color: #666; margin-top: 8px; }
        .links-wrapper { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; }
        .link-card { background-color: var(--white); padding: 18px; border-radius: 15px; text-decoration: none; display: flex; align-items: center; transition: all 0.3s ease; border: 1px solid #eee; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .link-card:active { transform: scale(0.98); background-color: #f0f0f0; }
        .link-card i { font-size: 24px; width: 40px; text-align: center; }
        .link-text { flex-grow: 1; text-align: center; font-weight: bold; font-size: 16px; color: #333; }
        .fa-utensils { color: var(--primary-orange); }
        .fa-tiktok { color: #000; }
        .fa-instagram { color: #E4405F; }
        .fa-whatsapp { color: #25D366; }
        .fa-phone { color: #007AFF; }
        .fa-map-location-dot { color: #EA4335; }
        .footer { margin-top: 40px; font-size: 12px; color: #aaa; }
    </style>
</head>
<body>

    <div class="profile-container">
        <div class="profile-logo"></div>
        <h1>فطائر الخالدية للمعجنات</h1>
        <p class="description">طعم الأصالة في كل قرمشة ✨</p>
    </div>

    <div class="links-wrapper">
        <a href="menu1.html" class="link-card">
            <i class="fas fa-utensils"></i>
            <span class="link-text">اطلب أونلاين (استلام من الفرع والتوصيل)</span>
        </a>

        <a href="https://www.tiktok.com/@fatayer_khalidiy" target="_blank" class="link-card">
            <i class="fab fa-tiktok"></i>
            <span class="link-text">تابعنا على تيك توك</span>
        </a>

        <a href="https://www.instagram.com/khaldiyehpastry" target="_blank" class="link-card">
            <i class="fab fa-instagram"></i>
            <span class="link-text">تابعنا على انستقرام</span>
        </a>

        <a href="https://wa.me/966539800010" class="link-card">
            <i class="fab fa-whatsapp"></i>
            <span class="link-text">تواصل عبر الواتساب</span>
        </a>

        <a href="tel:0555990935" class="link-card">
            <i class="fas fa-phone"></i>
            <span class="link-text">اتصال هاتفي</span>
        </a>

        <a href="https://maps.app.goo.gl/zCmaAYSYCMTtD3cz8" target="_blank" class="link-card">
            <i class="fas fa-map-location-dot"></i>
            <span class="link-text">موقع الفرع (قوقل ماب)</span>
        </a>
    </div>

    <div class="footer">© 2026 فطائر الخالدية للمعجنات</div>

</body>
</html>
