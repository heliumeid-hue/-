<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فطائر الخالدية للمعجنات</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange: #C84C21;
            --orange-light: #f5e8e3;
            --orange-mid: #e8c4b4;
            --green: #144A42;
            --green-light: #e8f0ef;
            --bg: #F5F0ED;
            --card: #FFFFFF;
            --text: #1a1a1a;
            --text-muted: #7a7a7a;
            --border: #EDE8E4;
            --whatsapp: #25D366;
            --radius: 16px;
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding-bottom: 120px;
            min-height: 100vh;
        }

        /* ── HEADER ── */
        .header {
            background: var(--green);
            padding: 22px 20px 18px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: 0 4px 20px rgba(20,74,66,0.3);
        }
        .header h1 {
            color: #fff;
            font-size: 22px;
            font-weight: 900;
            letter-spacing: -0.3px;
        }
        .header p {
            color: rgba(255,255,255,0.75);
            font-size: 13px;
            margin-top: 4px;
            font-weight: 500;
        }
        .header-badge {
            display: inline-block;
            background: var(--orange);
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            padding: 5px 14px;
            border-radius: 50px;
            margin-top: 10px;
        }

        /* ── CATEGORY NAV ── */
        .cat-nav {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 14px 16px;
            background: var(--card);
            border-bottom: 1px solid var(--border);
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        .cat-nav::-webkit-scrollbar { display: none; }
        .cat-pill {
            flex-shrink: 0;
            background: var(--bg);
            border: 1.5px solid var(--border);
            color: var(--text-muted);
            font-family: 'Tajawal', sans-serif;
            font-size: 13px;
            font-weight: 700;
            padding: 7px 16px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.18s;
            white-space: nowrap;
        }
        .cat-pill.active, .cat-pill:hover {
            background: var(--green);
            border-color: var(--green);
            color: #fff;
        }

        /* ── SECTIONS ── */
        .menu-wrap { max-width: 680px; margin: 0 auto; padding: 20px 14px 0; }

        .cat-section { margin-bottom: 32px; }
        .cat-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }
        .cat-header h2 {
            font-size: 20px;
            font-weight: 900;
            color: var(--green);
        }
        .cat-header-line {
            flex: 1;
            height: 2px;
            background: linear-gradient(to left, transparent, var(--orange-mid));
            border-radius: 2px;
        }
        .cat-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--orange);
            flex-shrink: 0;
        }

        /* ── ITEM CARD ── */
        .item-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 12px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: box-shadow 0.2s;
        }
        .item-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.1); }

        .item-card.has-order {
            border-color: var(--orange);
            box-shadow: 0 0 0 2px var(--orange-light), var(--shadow);
        }

        /* top row: info only, no image */
        .item-top {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            gap: 12px;
        }
        .item-info { flex: 1; }
        .item-name {
            font-size: 16px;
            font-weight: 800;
            color: var(--text);
            line-height: 1.3;
        }
        .item-price-range {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 3px;
            font-weight: 500;
        }
        .item-price-range span { color: var(--orange); font-weight: 700; }

        /* single-size items: qty inline */
        .item-qty-inline {
            display: flex;
            align-items: center;
            gap: 0;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            flex-shrink: 0;
        }
        .qty-btn {
            border: none;
            width: 36px;
            height: 36px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
            font-family: 'Tajawal', sans-serif;
        }
        .qty-btn.minus { background: var(--green); color: #fff; }
        .qty-btn.plus  { background: var(--orange); color: #fff; }
        .qty-btn:active { opacity: 0.8; }
        .qty-num {
            width: 34px;
            text-align: center;
            font-size: 16px;
            font-weight: 800;
            color: var(--text);
            pointer-events: none;
            background: transparent;
            border: none;
            font-family: 'Tajawal', sans-serif;
        }

        /* ── SIZE ROWS ── */
        .size-rows {
            border-top: 1px solid var(--border);
            padding: 10px 14px 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .size-row {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            padding: 8px 12px;
            transition: border-color 0.15s, background 0.15s;
        }
        .size-row.active-size {
            border-color: var(--orange);
            background: var(--orange-light);
        }
        .size-label {
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
            min-width: 45px;
        }
        .size-price {
            font-size: 13px;
            color: var(--orange);
            font-weight: 700;
            flex: 1;
        }
        .size-qty {
            display: flex;
            align-items: center;
            background: var(--card);
            border: 1.5px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }
        .size-qty .qty-btn { width: 30px; height: 30px; font-size: 18px; }
        .size-qty .qty-num { width: 28px; font-size: 14px; }

        /* ── CART BADGE ── */
        .order-badge {
            display: none;
            background: var(--orange);
            color: #fff;
            font-size: 11px;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 50px;
            margin-top: 5px;
        }
        .order-badge.visible { display: inline-block; }

        /* ── BOTTOM BAR ── */
        .bottom-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: var(--card);
            border-top: 1px solid var(--border);
            box-shadow: 0 -6px 24px rgba(0,0,0,0.08);
            padding: 14px 20px;
            z-index: 100;
            max-width: 100%;
        }
        .bottom-content {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .bottom-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .total-wrap {}
        .total-label { font-size: 12px; color: var(--text-muted); font-weight: 600; }
        .total-amount { font-size: 26px; font-weight: 900; color: var(--green); line-height: 1; }
        .total-amount span { font-size: 14px; font-weight: 600; color: var(--text-muted); }

        .buttons-row {
            display: flex;
            gap: 10px;
        }

        .send-btn {
            background: var(--whatsapp);
            color: #fff;
            border: none;
            padding: 12px 18px;
            border-radius: 12px;
            font-family: 'Tajawal', sans-serif;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(37,211,102,0.35);
            transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            flex: 1;
        }
        .send-btn:active { transform: scale(0.97); box-shadow: 0 2px 8px rgba(37,211,102,0.2); }
        .send-btn svg { width: 18px; height: 18px; fill: #fff; flex-shrink: 0; }

        .send-btn.delivery {
            background: var(--orange);
            box-shadow: 0 4px 14px rgba(200,76,33,0.35);
        }
        .send-btn.delivery:active { box-shadow: 0 2px 8px rgba(200,76,33,0.2); }

        /* Disabled state */
        .send-btn:disabled {
            background: #ccc;
            color: #888;
            cursor: not-allowed;
            box-shadow: none;
            opacity: 0.6;
        }
        .send-btn:disabled:active {
            transform: none;
        }

        .closed-notice {
            display: none;
            background: #fdecea;
            color: #b71c1c;
            font-size: 12px;
            font-weight: 700;
            padding: 8px 12px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #ef9a9a;
        }
        .closed-notice.show {
            display: block;
        }

        /* ── ITEM COUNT BUBBLE ── */
        .item-count-total {
            font-size: 11px;
            background: var(--green-light);
            color: var(--green);
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 50px;
            margin-top: 3px;
            display: none;
        }
        .item-count-total.show { display: inline-block; }

        /* ── STATUS BANNER ── */
        .status-banner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px 18px;
            font-size: 14px;
            font-weight: 700;
            position: sticky;
            top: 0;
            z-index: 49;
            text-align: center;
        }
        .status-banner.open {
            background: #e8f5e9;
            color: #1b5e20;
            border-bottom: 2px solid #a5d6a7;
        }
        .status-banner.closed {
            background: #fdecea;
            color: #b71c1c;
            border-bottom: 2px solid #ef9a9a;
        }
        .status-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
            animation: pulse 1.8s infinite;
        }
        .open .status-dot  { background: #2e7d32; }
        .closed .status-dot { background: #c62828; animation: none; }
        @keyframes pulse {
            0%,100% { opacity: 1; transform: scale(1); }
            50%      { opacity: 0.5; transform: scale(1.3); }
        }
        .status-next { font-size: 12px; font-weight: 500; opacity: 0.8; }
    </style>
</head>

// qty state: { "itemKey|sizeIdx": qty }
const qtys = {};

function itemKey(catIdx, itemIdx) { return `${catIdx}-${itemIdx}`; }
function sizeKey(catIdx, itemIdx, sizeIdx) { return `${catIdx}-${itemIdx}-${sizeIdx}`; }

function getQty(k) { return qtys[k] || 0; }
function setQty(k, v) { qtys[k] = Math.max(0, v); }

// Track branch open/closed state
let isBranchOpen = false;

// ── BUILD DOM ──
function buildMenu() {
  const wrap = document.getElementById('menuWrap');
  wrap.innerHTML = '';

  menuData.forEach((cat, ci) => {
    const sec = document.createElement('div');
    sec.className = 'cat-section';
    sec.id = `sec-${cat.id}`;

    sec.innerHTML = `
      <div class="cat-header">
        <div class="cat-dot"></div>
        <h2>${cat.cat}</h2>
        <div class="cat-header-line"></div>
      </div>`;

    cat.items.forEach((item, ii) => {
      const isSingle = item.sizes.length === 1 && item.sizes[0].label === '';
      const img = item.img || cat.img || '';

      const card = document.createElement('div');
      card.className = 'item-card';
      card.id = `card-${ci}-${ii}`;

      const priceRange = isSingle
        ? `${item.sizes[0].price} ريال`
        : `من <span>${item.sizes[0].price}</span> - <span>${item.sizes[item.sizes.length-1].price}</span> ريال`;

      if (isSingle) {
        const sk = sizeKey(ci, ii, 0);
        card.innerHTML = `
          <div class="item-top">
            <div class="item-info">
              <div class="item-name">${item.name}</div>
              <div class="item-price-range">${priceRange}</div>
              <div class="order-badge" id="badge-${ci}-${ii}"></div>
            </div>
            <div class="item-qty-inline">
              <button class="qty-btn plus" onclick="change('${sk}',1)">+</button>
              <div class="qty-num" id="qn-${sk}">0</div>
              <button class="qty-btn minus" onclick="change('${sk}',-1)">−</button>
            </div>
          </div>`;
      } else {
        let sizeRows = item.sizes.map((s, si) => {
          const sk = sizeKey(ci, ii, si);
          return `
            <div class="size-row" id="srow-${sk}">
              <div class="size-label">${s.label}</div>
              <div class="size-price">${s.price} ريال</div>
              <div class="size-qty">
                <button class="qty-btn plus" onclick="change('${sk}',1)">+</button>
                <div class="qty-num" id="qn-${sk}">0</div>
                <button class="qty-btn minus" onclick="change('${sk}',-1)">−</button>
              </div>
            </div>`;
        }).join('');

        card.innerHTML = `
          <div class="item-top">
            <div class="item-info">
              <div class="item-name">${item.name}</div>
              <div class="item-price-range">${priceRange}</div>
              <div class="order-badge" id="badge-${ci}-${ii}"></div>
            </div>
          </div>
          <div class="size-rows">${sizeRows}</div>`;
      }

      sec.appendChild(card);
    });

    wrap.appendChild(sec);
  });
}

// ── UPDATE QTY ──
function change(sk, delta) {
  setQty(sk, getQty(sk) + delta);
  const el = document.getElementById(`qn-${sk}`);
  if (el) el.textContent = getQty(sk);

  // highlight size row
  const srow = document.getElementById(`srow-${sk}`);
  if (srow) srow.classList.toggle('active-size', getQty(sk) > 0);

  // parse key
  const parts = sk.split('-');
  const ci = parts[0], ii = parts[1];
  updateCard(ci, ii);
  updateTotal();
}

function updateCard(ci, ii) {
  const cat = menuData[ci];
  const item = cat.items[ii];
  const card = document.getElementById(`card-${ci}-${ii}`);
  const badge = document.getElementById(`badge-${ci}-${ii}`);

  let totalQty = 0;
  let parts = [];
  item.sizes.forEach((s, si) => {
    const q = getQty(sizeKey(ci, ii, si));
    if (q > 0) {
      totalQty += q;
      parts.push(s.label ? `${s.label}×${q}` : `×${q}`);
    }
  });

  card.classList.toggle('has-order', totalQty > 0);
  if (badge) {
    badge.textContent = parts.join(' • ');
    badge.classList.toggle('visible', totalQty > 0);
  }
}

function updateTotal() {
  let total = 0;
  menuData.forEach((cat, ci) => {
    cat.items.forEach((item, ii) => {
      item.sizes.forEach((s, si) => {
        total += s.price * getQty(sizeKey(ci, ii, si));
      });
    });
  });
  document.getElementById('totalDisplay').textContent = total;
}

// ── SEND PICKUP ORDER ──
function sendOrder() {
  if (!isBranchOpen) {
    alert('⚠️ عذراً، الفرع مغلق حالياً. يرجى الطلب خلال ساعات العمل.');
    return;
  }
  
  let lines = [];
  let total = 0;
  menuData.forEach((cat, ci) => {
    cat.items.forEach((item, ii) => {
      item.sizes.forEach((s, si) => {
        const q = getQty(sizeKey(ci, ii, si));
        if (q > 0) {
          const sub = s.price * q;
          const label = s.label ? `${item.name} - ${s.label}` : item.name;
          lines.push(`${q}x ${label} (${sub} ريال)`);
          total += sub;
        }
      });
    });
  });
  if (!lines.length) { alert('الرجاء اختيار صنف واحد على الأقل.'); return; }
  const map = 'https://maps.app.goo.gl/zCmaAYSYCMTtD3cz8';
  let msg = `*طلب استلام من الفرع*\n\n${lines.join('\n')}\n\n💵 *الإجمالي:* ${total} ريال\n\n📍 *موقع الفرع:* ${map}\n\n_يرجى البدء بتجهيز الطلب.. شكراً!_`;
  window.open(`https://wa.me/966539800010?text=${encodeURIComponent(msg)}`, '_blank');
}

// ── NAV SCROLL ──
function navTo(btn, id) {
  const headerH = document.querySelector('.header').offsetHeight;
  const navH    = document.querySelector('.cat-nav').offsetHeight;
  const el = document.getElementById(`sec-${id}`);
  if (el) {
    const top = el.getBoundingClientRect().top + window.pageYOffset - headerH - navH - 10;
    window.scrollTo({ top, behavior: 'smooth' });
  }
  document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
}

// ── BRANCH HOURS (KSA = UTC+3) ──
// Each day: array of [openMinutes, closeMinutes] pairs (midnight = 0, 1440 = next midnight)
const HOURS = {
  0: [[390, 690], [1050, 1440]], // Sunday:    6:30-11:30, 17:30-24:00
  1: [[390, 690], [1050, 1440]], // Monday
  2: [[390, 690], [1050, 1440]], // Tuesday
  3: [[390, 690], [1050, 1440]], // Wednesday
  4: [[390, 690], [1050, 1440]], // Thursday
  5: [[1050, 1440]],             // Friday:    17:30-24:00 only
  6: [[390, 690], [1050, 1440]]  // Saturday
};

const DAY_AR = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];

function minsToStr(m) {
  const h = Math.floor(m / 60) % 24;
  const min = m % 60;
  const ampm = h < 12 ? 'ص' : 'م';
  const h12 = h % 12 || 12;
  return `${h12}:${String(min).padStart(2,'0')} ${ampm}`;
}

function updateButtonStates(isOpen) {
  const pickupBtn = document.getElementById('pickupBtn');
  const deliveryBtn = document.getElementById('deliveryBtn');
  const closedNotice = document.getElementById('closedNotice');
  
  isBranchOpen = isOpen;
  
  pickupBtn.disabled = !isOpen;
  deliveryBtn.disabled = !isOpen;
  
  if (isOpen) {
    closedNotice.classList.remove('show');
  } else {
    closedNotice.classList.add('show');
  }
}

function checkStatus() {
  const now = new Date();
  // KSA = UTC+3
  const ksaOffset = 3 * 60;
  const utcMin = now.getUTCHours() * 60 + now.getUTCMinutes();
  const ksaMin = (utcMin + ksaOffset) % 1440;
  const ksaDay = Math.floor((now.getUTCDay() * 1440 + utcMin + ksaOffset) / 1440) % 7;

  const todaySlots = HOURS[ksaDay] || [];
  const banner = document.getElementById('statusBanner');
  const textEl = document.getElementById('statusText');
  const nextEl = document.getElementById('statusNext');

  // check if currently open
  const isOpen = todaySlots.some(([o, c]) => ksaMin >= o && ksaMin < c);

  // Update button states
  updateButtonStates(isOpen);

  if (isOpen) {
    banner.className = 'status-banner open';
    textEl.textContent = '✅ الفرع مفتوح الآن';
    // find when current slot ends
    const currentSlot = todaySlots.find(([o, c]) => ksaMin >= o && ksaMin < c);
    nextEl.textContent = `يغلق الساعة ${minsToStr(currentSlot[1])}`;
  } else {
    banner.className = 'status-banner closed';
    textEl.textContent = '🔴 الفرع مغلق الآن';
    // find next opening: check remaining slots today, then tomorrow
    let nextOpen = null;
    for (const [o] of todaySlots) {
      if (ksaMin < o) { nextOpen = { day: ksaDay, mins: o }; break; }
    }
    if (!nextOpen) {
      // search next 7 days
      for (let d = 1; d <= 7; d++) {
        const nd = (ksaDay + d) % 7;
        if (HOURS[nd] && HOURS[nd].length) {
          nextOpen = { day: nd, mins: HOURS[nd][0][0] }; break;
        }
      }
    }
    if (nextOpen) {
      const dayLabel = nextOpen.day === ksaDay ? 'اليوم' : DAY_AR[nextOpen.day];
      nextEl.textContent = `يفتح ${dayLabel} ${minsToStr(nextOpen.mins)}`;
    }
  }
}

checkStatus();
setInterval(checkStatus, 60000); // refresh every minute
